name: Run tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP with cURL
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl

      - name: Run test suite
        run: ./tests/test.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (without pushing)
        run: docker build -t dyndns-netcup-test .
